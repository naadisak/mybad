<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองสนามระบายแค้น</title>
    <style>
        /* ล้างขอบจอให้เว็บฝังเต็มพื้นที่ 100% */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8fafc; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="gasFrame" title="ระบบจองสนามระบายแค้น" allow="geolocation"></iframe>

    <script>
        // 1. URL ตัวเต็มของ Google Apps Script
        let gasUrl = "https://script.google.com/macros/s/AKfycbw9G-stfK_wudAeiKyYWzL3nRI8rolqvi9DA8G79UvYInqtaIMZCbJoyvdTdTTsBC7rjQ/exec";

        // 2. ดึงค่าจาก URL ของ GitHub (ตอนคนสแกน QR หน้าสนาม)
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        const code = urlParams.get('code');

        // 3. ถ้าสแกน QR มา ให้เอาค่าไปต่อท้ายลิงก์ Google Script ด้วย
        if (action && code) {
            gasUrl += "?action=" + encodeURIComponent(action) + "&code=" + encodeURIComponent(code);
        }

        // 4. สั่งให้ Iframe โหลดเว็บ
        document.getElementById('gasFrame').src = gasUrl;
    </script>
</body>
</html>
